<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-5KSFR9S0QX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-5KSFR9S0QX');
  </script>
  
  <script>
    // Fast client-side routing redirect for legacy/lowercase EnCBAM URLs and blog posts
    (function () {
      const rawPath = window.location.pathname;
      const path = rawPath.toLowerCase();
      
      // 1. Redirect /cbam-blog/* -> https://encbam.com/blog/*
      if (path.startsWith('/cbam-blog')) {
        const file = rawPath.substring('/cbam-blog'.length);
        window.location.replace('https://encbam.com/blog' + file + window.location.hash);
        return;
      }

      // 2. Redirect legacy /EnCBAM -> https://encbam.com
      const cleanPath = path.endsWith('/') ? path.slice(0, -1) : path;
      if (cleanPath === '/encbam' || cleanPath === '/encbam.html') {
        window.location.replace('https://encbam.com' + window.location.hash);
      }
    })();
  </script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | EnCarbonSys</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-dark: #070B19;
      --card-bg: rgba(15, 23, 42, 0.45);
      --primary: #10B981;
      --primary-glow: rgba(16, 185, 129, 0.15);
      --text-main: #F1F5F9;
      --text-muted: #94A3B8;
      --border-color: rgba(255, 255, 255, 0.08);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-main);
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated abstract grid background */
    .bg-grid {
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(rgba(16, 185, 129, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(16, 185, 129, 0.05) 1px, transparent 1px);
      background-size: 50px 50px;
      mask-image: radial-gradient(circle at center, black, transparent 80%);
      -webkit-mask-image: radial-gradient(circle at center, black, transparent 80%);
      pointer-events: none;
      z-index: 1;
    }

    /* Glowing decorative blobs */
    .glow-blob {
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 1;
      filter: blur(40px);
    }
    .blob-1 {
      top: -100px;
      right: -100px;
      animation: float-slow 12s ease-in-out infinite alternate;
    }
    .blob-2 {
      bottom: -150px;
      left: -150px;
      animation: float-slow 15s ease-in-out infinite alternate-reverse;
    }

    @keyframes float-slow {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(40px, 30px) scale(1.1); }
    }

    .container {
      position: relative;
      z-index: 10;
      max-width: 550px;
      width: 90%;
      text-align: center;
      padding: 3rem 2rem;
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      animation: fade-in-up 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes fade-in-up {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .icon-wrapper {
      margin-bottom: 2rem;
      position: relative;
      display: inline-block;
    }

    .error-code {
      font-family: 'Outfit', sans-serif;
      font-size: 8rem;
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, #FFFFFF 30%, var(--primary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -2px;
      margin-bottom: 1rem;
    }

    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.8rem;
      font-weight: 600;
      color: var(--text-main);
      margin-bottom: 1rem;
      letter-spacing: -0.5px;
    }

    p {
      color: var(--text-muted);
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      background: var(--primary);
      color: #070B19;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.95rem;
      padding: 0.85rem 2rem;
      border-radius: 12px;
      transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 4px 20px rgba(16, 185, 129, 0.3);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(16, 185, 129, 0.45);
      filter: brightness(1.05);
    }

    .btn:active {
      transform: translateY(0);
    }

    .logo-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-main);
      text-decoration: none;
      font-weight: 600;
      margin-bottom: 2.5rem;
      opacity: 0.85;
      transition: opacity 0.2s;
    }
    
    .logo-link:hover {
      opacity: 1;
    }

    .logo-link img {
      height: 28px;
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="glow-blob blob-1"></div>
  <div class="glow-blob blob-2"></div>

  <div class="container">
    <a href="/" class="logo-link">
      <img src="https://image2url.com/images/1754762251826-aabbb9f2-5d26-42f3-b2a7-896ce713de40.png" alt="EnCarbonSys Logo">
      <span>EnCarbonSys</span>
    </a>

    <div class="icon-wrapper">
      <div class="error-code">404</div>
    </div>

    <h1>System Node Not Found</h1>
    <p>The system component or path you are looking for does not exist or has been reorganized under our new clean URL guidelines.</p>

    <a href="/" class="btn">
      <i class="fa-solid fa-arrow-left"></i>
      Return to System Control
    </a>
  </div>
</body>
</html>
